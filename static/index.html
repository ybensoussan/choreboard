<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ChoreBoard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
</head>
<body>
    <!-- Top Bar -->
    <header id="top-bar">
        <div class="header-row">
            <h1 class="app-title">ChoreBoard</h1>
            <div id="child-selector"></div>
            <div id="points-display">
                <img class="points-star-img" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/2b50.svg" alt="⭐">
                <span id="points-count">0</span>
            </div>
            <button id="profile-btn" class="profile-btn" title="Login">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content"></main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Emoji Picker Modal -->
    <div id="emoji-picker-overlay" class="picker-overlay hidden">
        <div class="picker-modal">
            <div class="picker-header">
                <span class="picker-title">Pick an emoji</span>
                <button class="picker-close">&times;</button>
            </div>
            <div class="picker-grid" id="emoji-picker-grid"></div>
        </div>
    </div>

    <!-- Login / Profile Modal -->
    <div id="login-overlay" class="picker-overlay hidden">
        <div class="picker-modal login-modal">
            <div class="picker-header">
                <span class="picker-title" id="login-modal-title">Login</span>
                <button class="picker-close" id="login-close">&times;</button>
            </div>
            <div id="login-modal-body">
                <form class="login-form" id="login-form">
                    <input type="text" id="login-username" placeholder="Username" autocomplete="username" required>
                    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
                    <div id="login-error" class="login-error"></div>
                    <button type="submit" class="login-submit-btn">Login</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-tab="chores">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
            <span class="nav-label">Chores</span>
        </button>
        <button class="nav-btn" data-tab="rewards">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 9 7h6s2-3 4.5-3a2.5 2.5 0 0 1 0 5H18"/><path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 9v12"/><path d="M6 9h12"/></svg>
            <span class="nav-label">Prizes</span>
        </button>
        <button class="nav-btn" data-tab="calendar">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
            <span class="nav-label">History</span>
        </button>
        <button class="nav-btn auth-hidden" data-tab="print">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect width="12" height="8" x="6" y="14" rx="1"/></svg>
            <span class="nav-label">Print</span>
        </button>
        <button class="nav-btn auth-hidden" data-tab="settings">
            <svg class="nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="nav-label">Settings</span>
        </button>
    </nav>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" class="picker-overlay hidden">
        <div class="picker-modal confirm-modal">
            <div class="confirm-icon" id="confirm-icon"></div>
            <div class="confirm-title" id="confirm-title"></div>
            <div class="confirm-msg" id="confirm-msg"></div>
            <div class="confirm-btns">
                <button class="confirm-cancel-btn" id="confirm-cancel">Cancel</button>
                <button class="confirm-ok-btn" id="confirm-ok">Remove</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
